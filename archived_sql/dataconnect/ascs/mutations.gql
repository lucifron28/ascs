# Mutations for ASCS Client App

# 1. Create or Update User Profile
mutation CreateProfile($id: String!, $email: String!, $username: String!, $fullName: String!, $role: UserRole!) {
  profile_insert(data: {
    id: $id,
    email: $email,
    username: $username,
    fullName: $fullName,
    role: $role,
    accountStatus: active,
    mustChangePassword: true
  })
}

# 2. Create Student Record
mutation CreateStudent($id: String!, $studentIdNumber: String!, $program: String!, $yearLevel: Int!, $section: String!) {
  student_insert(data: {
    id: $id,
    studentIdNumber: $studentIdNumber,
    program: $program,
    yearLevel: $yearLevel,
    section: $section
  })
}

# 3. Create Notification
mutation CreateNotification($recipientId: String!, $type: String!, $message: String!, $relatedApplicationId: UUID) {
  notification_insert(data: {
    recipientId: $recipientId,
    type: $type,
    message: $message,
    relatedApplicationId: $relatedApplicationId,
    isRead: false
  })
}

# 4. Mark Notification as Read
mutation MarkNotificationRead($id: UUID!) {
  notification_update(id: $id, data: { isRead: true })
}

# 5. Add Remark
mutation AddRemark($approvalId: UUID!, $authorId: String!, $content: String!) {
  remark_insert(data: {
    approvalId: $approvalId,
    authorId: $authorId,
    content: $content
  })
}

# 6. Update Financial Status
mutation UpdateFinancialRecord($id: UUID!, $status: FinancialStatus!, $notes: String, $updatedById: String) {
  financialRecord_update(id: $id, data: {
    status: $status,
    notes: $notes,
    updatedById: $updatedById,
    verifiedAt: "request.time"
  })
}
