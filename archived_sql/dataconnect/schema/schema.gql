# Automated Student Clearance System (ASCS) Schema
# Configured for Firebase SQL Connect (Cloud SQL for PostgreSQL)

enum UserRole {
  student
  librarian
  accountant
  osa_coordinator
  guidance_counselor
  area_chair
  adviser
  dean
  admin
}

enum ClearanceStatus {
  pending
  approved
  not_approved
}

enum FinancialStatus {
  paid
  unpaid
}

enum AccountStatus {
  active
  inactive
  deactivated
}

# 1. User Profiles
type Profile @table {
  # Keyed by Firebase Auth UID
  id: String! @default(expr: "auth.uid")
  email: String! @unique
  username: String! @unique
  fullName: String!
  role: UserRole! @default(value: student)
  accountStatus: AccountStatus! @default(value: active)
  mustChangePassword: Boolean! @default(value: true)
  contactNumber: String
  lastPasswordChangedAt: Timestamp
  deactivatedAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# 2. Student extended profiles
type Student @table {
  # 1:1 with Profile, also acts as primary key
  id: String! @default(expr: "auth.uid")
  profile: Profile! @unique
  studentIdNumber: String! @unique
  program: String!
  yearLevel: Int!
  section: String!
  createdAt: Timestamp! @default(expr: "request.time")
}

# 3. Clearance requirements defined by the system
type ClearanceRequirement @table {
  id: UUID! @default(expr: "uuidV4()")
  role: UserRole!
  label: String!
  displayOrder: Int!
  isActive: Boolean! @default(value: true)
  assignedSignatory: Profile
}

# 4. Clearance application headers submitted by students
type ClearanceApplication @table {
  id: UUID! @default(expr: "uuidV4()")
  applicationNumber: String! @unique
  student: Student!
  academicYear: String!
  semester: String!
  purpose: String!
  overallStatus: ClearanceStatus! @default(value: pending)
  submittedAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# 5. Clearance approval checklist rows (signatory card list)
type ClearanceApproval @table {
  id: UUID! @default(expr: "uuidV4()")
  application: ClearanceApplication!
  requirement: ClearanceRequirement!
  signatoryRole: UserRole!
  assignedSignatory: Profile
  status: ClearanceStatus! @default(value: pending)
  actedAt: Timestamp
  updatedAt: Timestamp! @default(expr: "request.time")
}

# 6. Remarks panel comments attached to rejections/pendings
type Remark @table {
  id: UUID! @default(expr: "uuidV4()")
  approval: ClearanceApproval!
  author: Profile
  content: String!
  createdAt: Timestamp! @default(expr: "request.time")
}

# 7. Financial accountability indicator record
type FinancialRecord @table {
  id: UUID! @default(expr: "uuidV4()")
  application: ClearanceApplication! @unique
  student: Student!
  status: FinancialStatus! @default(value: unpaid)
  notes: String
  updatedBy: Profile
  verifiedAt: Timestamp
  recordedAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# 8. In-app notifications list
type Notification @table {
  id: UUID! @default(expr: "uuidV4()")
  recipient: Profile!
  type: String!
  message: String!
  relatedApplication: ClearanceApplication
  isRead: Boolean! @default(value: false)
  createdAt: Timestamp! @default(expr: "request.time")
}

# 9. Audit trail activity logs
type ActivityLog @table {
  id: UUID! @default(expr: "uuidV4()")
  actor: Profile
  action: String!
  entityType: String!
  entityId: UUID!
  metadata: Any @col(dataType: "jsonb")
  createdAt: Timestamp! @default(expr: "request.time")
}
